{% extends "base.html" %}

{% block title %}Ajouter un lavage{% endblock %}

{% block content %}
<h1 class="mt-2 mb-4">Ajouter un lavage</h1>

<div class="card">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
            <label for="type_service">Type de service *</label>
            <select class="form-control" id="type_service" name="type_service" required>
                {% for value, label in types_service %}
                <option value="{{ value }}">{{ label }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="plaque">Numéro de plaque (optionnel)</label>
            <input type="text" class="form-control" id="plaque" name="plaque" placeholder="Ex: ABC-123-CD">
        </div>

        <div class="form-group">
            <label for="montant">Montant payé (FC) *</label>
            <input type="number" class="form-control" id="montant" name="montant" step="0.01" min="0" required>
            <small style="color: var(--text-secondary);">Note: Vous ne verrez pas les totaux d'argent dans votre historique.</small>
        </div>

        <div class="form-group">
            <label for="notes">Notes (optionnel)</label>
            <textarea class="form-control" id="notes" name="notes" rows="3" placeholder="Informations supplémentaires..."></textarea>
        </div>

        <div class="form-group">
            <label for="photos">Photos * (minimum 1, recommandé 2: avant/après)</label>
            <input type="file" class="form-control" id="photos" name="photos" multiple accept="image/*" required>
            <small style="color: var(--text-secondary);">La première photo sera marquée "Avant", la deuxième "Après"</small>
        </div>

        <div class="mt-3">
            <button type="submit" class="btn btn-primary btn-block">Enregistrer le lavage</button>
            <a href="{% url 'employe_dashboard' %}" class="btn btn-danger btn-block mt-2">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
