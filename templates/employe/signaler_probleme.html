{% extends "base.html" %}

{% block title %}Signaler un problème{% endblock %}

{% block content %}
<h1 class="mt-2 mb-4">Signaler un problème</h1>

<div class="card">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
            <label for="categorie">Catégorie *</label>
            <select class="form-control" id="categorie" name="categorie" required>
                <option value="">— Sélectionner —</option>
                {% for value, label in categories %}
                <option value="{{ value }}">{{ label }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="description">Description *</label>
            <textarea class="form-control" id="description" name="description" rows="5" required placeholder="Décrivez le problème en détail..."></textarea>
        </div>

        <div class="form-group">
            <label for="photo">Photo (optionnel)</label>
            <input type="file" class="form-control" id="photo" name="photo" accept="image/*">
            <small style="color: var(--text-secondary);">Une photo peut aider à mieux comprendre le problème</small>
        </div>

        <div class="mt-3">
            <button type="submit" class="btn btn-warning btn-block">Signaler le problème</button>
            <a href="{% url 'employe_dashboard' %}" class="btn btn-danger btn-block mt-2">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
